<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found — James Cage</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Lora:wght@400;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/assets/css/main.css">
</head>
<body data-page="error">

  <header class="site-header" role="banner">
    <div class="site-header__inner">
      <a href="/" class="site-logo">James Cage</a>

      <nav class="site-nav" aria-label="Site navigation">
        <ul id="nav-links" class="site-nav__list" role="list"></ul>
        <button
          id="nav-hamburger"
          class="site-nav__hamburger"
          aria-label="Open navigation menu"
          aria-expanded="false"
          aria-controls="nav-mobile-menu"
        >
          <span></span>
          <span></span>
          <span></span>
        </button>
      </nav>
    </div>

    <div id="nav-mobile-menu" class="site-nav__mobile-menu" role="dialog" aria-label="Navigation menu">
      <ul id="nav-links-mobile" class="site-nav__mobile-list" role="list"></ul>
    </div>
  </header>

  <main class="not-found-main" id="main-content">
    <p class="not-found-number" aria-label="Error 404">404</p>
    <p class="not-found-message">Uh Oh. That page doesn't exist.</p>
    <a href="/" class="not-found-home">Return to home</a>
  </main>

  <footer class="site-footer" role="contentinfo">
    <p>&copy; 2026 James Cage</p>
  </footer>

  <script src="/assets/js/nav.js"></script>
</body>
</html>
